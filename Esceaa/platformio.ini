; ================================================
; PlatformIO Configuration - SIMPLE & STABLE
; Tidak butuh library external!
; ================================================

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; ==========================================
; SERIAL MONITOR
; ==========================================
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    colorize
    time

; ==========================================
; UPLOAD SETTINGS
; ==========================================
upload_speed = 921600

; ⬇️ GANTI PORT INI SESUAI SISTEM ANDA ⬇️
; Cara cek: pio device list


; Uncomment jika ingin auto-detect port:
; upload_port = COM*              ; Windows
; upload_port = /dev/ttyUSB*      ; Linux
; upload_port = /dev/cu.usbserial* ; Mac

; ==========================================
; BUILD FLAGS (OPTIONAL)
; ==========================================
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=0

; ==========================================
; BOARD SETTINGS
; ==========================================
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.partitions = default.csv

; ==========================================
; CATATAN:
; WebServer dan ESPmDNS sudah BUILT-IN!
; Tidak perlu install library tambahan
; ==========================================